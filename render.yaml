services:
  - type: web_service
    name: mobile-garage-sys
    env: node
    plan: free
    # Replace placeholder values with your real secrets in the Render dashboard (do not commit secrets)
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres:buayca10@HOST:5432/garage system"
      - key: DB_HOST
        value: "HOST"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "garage system"
      - key: DB_USER
        value: "postgres"
      - key: DB_PASSWORD
        value: "buayca10"
      - key: JWT_SECRET
        value: "replace_with_secret"
      - key: change_me_super_secret
        value: "change_me_refresh_secret"
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3000"
      - key: BASE_URL
        value: "https://your-app.onrender.com"
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: "no-reply@your-domain.com"
    buildCommand: npm ci --omit=dev
    startCommand: npm start
