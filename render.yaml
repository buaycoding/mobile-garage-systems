services:
  - type: web_service
    name: mobile-garage-sys
    env: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: mobile-garage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BASE_URL
        value: https://mobile-garage-sys.onrender.com

databases:
  - name: mobile-garage-db
    databaseName: mobile_garage
    user: mobile_garage_user
    plan: free
