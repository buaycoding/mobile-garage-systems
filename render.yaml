services:
  - type: web_service
    name: mobile-garage-sys
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: garage-booking-db
          type: postgresql
          property: connectionString
      - key: JWT_SECRET
        value: "replace_with_secret"
      - key: JWT_REFRESH_SECRET
        value: "replace_with_refresh_secret"
    buildCommand: npm ci --omit=dev
    startCommand: npm start
