name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: buayca10
          POSTGRES_DB: mobile garage
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: mobile garage
      DB_USER: postgres
      DB_PASSWORD: buayca10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # This runs your SQL schema against the test database container
      - run: PGPASSWORD=buayca10 psql -h localhost -U postgres -d mobile garage -f path/to/schema.sql

      - run: npm test
